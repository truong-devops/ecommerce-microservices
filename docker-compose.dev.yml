  analytics-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_DB: ecommerce_analytics
      CLICKHOUSE_USER: analytics
      CLICKHOUSE_PASSWORD: analytics_password
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - analytics_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ['CMD-SHELL', 'clickhouse-client --query "SELECT 1"']
      interval: 5s
      timeout: 3s
      retries: 20

  analytics-redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  analytics-service:
    <<: *service-defaults
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    env_file:
      - ./services/analytics-service/.env.dev
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      CLICKHOUSE_URL: http://analytics-clickhouse:8123
      CLICKHOUSE_DATABASE: ecommerce_analytics
      CLICKHOUSE_USERNAME: analytics
      CLICKHOUSE_PASSWORD: analytics_password
      REDIS_URL: redis://analytics-redis:6379
      KAFKA_ENABLED: 'false'
      KAFKA_BROKERS: kafka:29092
    ports:
      - '3010:3010'
    depends_on:
      analytics-clickhouse:
        condition: service_healthy
      analytics-redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    <<: *service-defaults
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    env_file:
      - ./services/api-gateway/.env.example
    environment:
      <<: *shared-jwt-gateway-secret
      APP_ENV: development
      PORT: 8080
      REQUEST_TIMEOUT: 45s
      JWT_SECRET: dev-shared-jwt-access-secret-min-32-chars
      AUTH_SERVICE_URL: http://auth-service:3001
      AUTH_SERVICE_TIMEOUT: 20s
      USER_SERVICE_URL: http://user-service:3000
      PRODUCT_SERVICE_URL: http://product-service:3003
      PRODUCT_SERVICE_TIMEOUT: 20s
      CART_SERVICE_URL: http://cart-service:3004
      ORDER_SERVICE_URL: http://order-service:3002
      PAYMENT_SERVICE_URL: http://payment-service:3006
      INVENTORY_SERVICE_URL: http://inventory-service:3007
      SHIPPING_SERVICE_URL: http://shipping-service:3008
      REVIEW_SERVICE_URL: http://review-service:3009
      NOTIFICATION_SERVICE_URL: http://notification-service:3009
      ANALYTICS_SERVICE_URL: http://analytics-service:3010
    ports:
      - '8080:8080'
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      inventory-service:
        condition: service_started
      shipping-service:
        condition: service_started
      review-service:
        condition: service_started
      notification-service:
        condition: service_started
      analytics-service:
        condition: service_started

volumes:
  auth_postgres_data:
  user_postgres_data:
  product_mongo_data:
  cart_postgres_data:
  order_postgres_data:
  payment_postgres_data:
  inventory_postgres_data:
  shipping_postgres_data:
  review_mongo_data:
  notification_postgres_data:
  analytics_clickhouse_data:


