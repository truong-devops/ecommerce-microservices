x-service-defaults: &service-defaults
  restart: unless-stopped
  extra_hosts:
    - 'host.docker.internal:host-gateway'

x-shared-jwt-access-secret: &shared-jwt-access-secret
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-access-secret-please-change-123456}

x-shared-jwt-gateway-secret: &shared-jwt-gateway-secret
  JWT_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-access-secret-please-change-123456}

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ['CMD', 'bash', '-lc', 'echo srvr | nc -w 2 localhost 2181 | grep Mode']
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - '9092:9092'
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 10s
      timeout: 5s
      retries: 10

  auth-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d auth_db']
      interval: 5s
      timeout: 3s
      retries: 20

  auth-redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    <<: *service-defaults
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    env_file:
      - ./services/auth-service/.env.example
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      DATABASE_URL: postgresql://postgres:postgres@auth-postgres:5432/auth_db
      REDIS_URL: redis://auth-redis:6379
      KAFKA_BROKERS: kafka:29092
    ports:
      - '3001:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      auth-postgres:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_user
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ecommerce_user']
      interval: 5s
      timeout: 3s
      retries: 20

  user-service:
    <<: *service-defaults
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    env_file:
      - ./services/user-service/.env.dev
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_TYPE: postgres
      DB_HOST: user-postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecommerce_user
      DB_SSL: 'false'
      DB_MIGRATIONS_RUN: 'true'
      KAFKA_ENABLED: 'false'
    ports:
      - '3100:3000'
    depends_on:
      user-postgres:
        condition: service_healthy

  product-mongo:
    image: mongo:6
    command: ['--bind_ip_all']
    volumes:
      - product_mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 20

  product-redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  product-service:
    <<: *service-defaults
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    env_file:
      - ./services/product-service/.env.dev
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      DATABASE_URL: mongodb://product-mongo:27017
      REDIS_URL: redis://product-redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_ENABLED: 'false'
    ports:
      - '3003:3003'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3003/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      product-mongo:
        condition: service_healthy
      product-redis:
        condition: service_healthy

  cart-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    volumes:
      - cart_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecommerce -d ecommerce']
