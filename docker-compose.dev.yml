      interval: 5s
      timeout: 3s
      retries: 20

  cart-service:
    <<: *service-defaults
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    env_file:
      - ./services/cart-service/.env.dev
    environment:
