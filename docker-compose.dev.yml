      DATABASE_URL: postgresql://ecommerce:ecommerce@cart-postgres:5432/ecommerce
      REDIS_URL: redis://cart-redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_ENABLED: 'false'
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      PRODUCT_SERVICE_BASE_URL: http://product-service:3003/api/v1
      INVENTORY_SERVICE_BASE_URL: http://inventory-service:3007/api/v1
    ports:
      - '3004:3004'
    depends_on:
      cart-postgres:
        condition: service_healthy
      cart-redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  order-postgres:
