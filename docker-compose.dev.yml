x-service-defaults: &service-defaults
  restart: unless-stopped
  extra_hosts:
    - 'host.docker.internal:host-gateway'

x-shared-jwt-access-secret: &shared-jwt-access-secret
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}

x-shared-jwt-gateway-secret: &shared-jwt-gateway-secret
  JWT_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ['CMD', 'bash', '-lc', 'echo srvr | nc -w 2 localhost 2181 | grep Mode']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - '9092:9092'
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'bash', '-lc', 'kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1']
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:7
    command: ['--bind_ip_all']
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    <<: *service-defaults
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    env_file:
      - ./services/auth-service/.env
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_db
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    ports:
      - '3001:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-service:
    <<: *service-defaults
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    env_file:
      - ./services/user-service/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecommerce_user
      DB_SSL: 'false'
      DB_MIGRATIONS_RUN: 'true'
      KAFKA_ENABLED: 'false'
    ports:
      - '3100:3000'
    depends_on:
      postgres:
        condition: service_healthy

  product-service:
    <<: *service-defaults
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    env_file:
      - ./services/product-service/.env
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      DATABASE_URL: mongodb://mongo:27017/ecommerce_product
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_ENABLED: 'false'
    ports:
      - '3003:3003'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3003/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  cart-service:
    <<: *service-defaults
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    env_file:
      - ./services/cart-service/.env
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_ENABLED: 'false'
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      PRODUCT_SERVICE_BASE_URL: http://product-service:3003/api/v1
      INVENTORY_SERVICE_BASE_URL: http://inventory-service:3007/api/v1
    ports:
      - '3004:3004'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  order-service:
    <<: *service-defaults
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    env_file:
      - ./services/order-service/.env
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    ports:
      - '3002:3002'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-service:
    <<: *service-defaults
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    env_file:
      - ./services/payment-service/.env
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    ports:
      - '3006:3006'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  inventory-service:
    <<: *service-defaults
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    env_file:
      - ./services/inventory-service/.env
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      KAFKA_BROKERS: kafka:29092
      KAFKA_ENABLED: 'false'
    ports:
      - '3007:3007'
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  shipping-service:
    <<: *service-defaults
    build:
      context: ./services/shipping-service
      dockerfile: Dockerfile
    env_file:
      - ./services/shipping-service/.env
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    ports:
      - '3008:3008'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  review-service:
    <<: *service-defaults
    build:
      context: ./services/review-service
      dockerfile: Dockerfile
    env_file:
      - ./services/review-service/.env
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      MONGODB_URI: mongodb://mongo:27017/ecommerce_review
    ports:
      - '3009:3009'
    depends_on:
      mongo:
        condition: service_healthy

  notification-service:
    <<: *service-defaults
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    env_file:
      - ./services/notification-service/.env
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: 'false'
      KAFKA_BROKERS: kafka:29092
    ports:
      - '3011:3009'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  analytics-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_DB: ecommerce_analytics
      CLICKHOUSE_USER: analytics
      CLICKHOUSE_PASSWORD: analytics_password
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - analytics_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ['CMD-SHELL', 'clickhouse-client --query "SELECT 1"']
      interval: 5s
      timeout: 3s
      retries: 20

  analytics-service:
    <<: *service-defaults
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    env_file:
      - ./services/analytics-service/.env
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      CLICKHOUSE_URL: http://analytics-clickhouse:8123
      CLICKHOUSE_DATABASE: ecommerce_analytics
      CLICKHOUSE_USERNAME: analytics
      CLICKHOUSE_PASSWORD: analytics_password
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: 'false'
      KAFKA_BROKERS: kafka:29092
    ports:
      - '3010:3010'
    depends_on:
      analytics-clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    <<: *service-defaults
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    env_file:
      - ./services/api-gateway/.env
    environment:
      <<: *shared-jwt-gateway-secret
      APP_ENV: development
      PORT: 8080
      REQUEST_TIMEOUT: 45s
      JWT_SECRET: dev-shared-jwt-access-secret-min-32-chars
      AUTH_SERVICE_URL: http://auth-service:3001
      AUTH_SERVICE_TIMEOUT: 20s
      USER_SERVICE_URL: http://user-service:3000
      PRODUCT_SERVICE_URL: http://product-service:3003
      PRODUCT_SERVICE_TIMEOUT: 20s
      CART_SERVICE_URL: http://cart-service:3004
      ORDER_SERVICE_URL: http://order-service:3002
      PAYMENT_SERVICE_URL: http://payment-service:3006
      INVENTORY_SERVICE_URL: http://inventory-service:3007
      SHIPPING_SERVICE_URL: http://shipping-service:3008
      REVIEW_SERVICE_URL: http://review-service:3009
      NOTIFICATION_SERVICE_URL: http://notification-service:3009
      ANALYTICS_SERVICE_URL: http://analytics-service:3010
    ports:
      - '8080:8080'
    depends_on:
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      inventory-service:
        condition: service_started
      shipping-service:
        condition: service_started
      review-service:
        condition: service_started
      notification-service:
        condition: service_started
      analytics-service:
        condition: service_started

volumes:
  postgres_data:
  mongo_data:
  analytics_clickhouse_data:
