services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ['CMD', 'bash', '-lc', 'echo srvr | nc -w 2 localhost 2181 | grep Mode']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - '9092:9092'
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'bash', '-lc', 'kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1']
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:7
    command: ['--bind_ip_all']
    restart: unless-stopped
    ports:
      - '37017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 20

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      APP_NAME: api-gateway
      APP_ENV: development
      PORT: 8080
      JWT_SECRET: ${JWT_ACCESS_SECRET:-change-me}
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:8081,http://localhost:19006
      REQUEST_TIMEOUT: 45s
      SHUTDOWN_TIMEOUT: 15s
      RATE_LIMIT_RPS: 50
      RATE_LIMIT_BURST: 100
      AUTH_SERVICE_URL: http://host.docker.internal:3001
      USER_SERVICE_URL: http://host.docker.internal:3100
      PRODUCT_SERVICE_URL: http://host.docker.internal:3003
      CART_SERVICE_URL: http://host.docker.internal:3004
      ORDER_SERVICE_URL: http://host.docker.internal:3002
      PAYMENT_SERVICE_URL: http://host.docker.internal:3006
      INVENTORY_SERVICE_URL: http://host.docker.internal:3007
      SHIPPING_SERVICE_URL: http://host.docker.internal:3008
      REVIEW_SERVICE_URL: http://host.docker.internal:3009
      NOTIFICATION_SERVICE_URL: http://host.docker.internal:3011
      ANALYTICS_SERVICE_URL: http://host.docker.internal:3010
      CHAT_SERVICE_URL: http://host.docker.internal:3012
      AUTH_SERVICE_TIMEOUT: 20s
      USER_SERVICE_TIMEOUT: 8s
      PRODUCT_SERVICE_TIMEOUT: 20s
      CART_SERVICE_TIMEOUT: 8s
      ORDER_SERVICE_TIMEOUT: 10s
      PAYMENT_SERVICE_TIMEOUT: 10s
      INVENTORY_SERVICE_TIMEOUT: 8s
      SHIPPING_SERVICE_TIMEOUT: 8s
      REVIEW_SERVICE_TIMEOUT: 8s
      NOTIFICATION_SERVICE_TIMEOUT: 8s
      ANALYTICS_SERVICE_TIMEOUT: 8s
      CHAT_SERVICE_TIMEOUT: 24h
    ports:
      - '8080:8080'

volumes:
  postgres_data:
  mongo_data:
