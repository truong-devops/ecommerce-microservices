      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      KAFKA_ENABLED: 'true'
      KAFKA_CLIENT_ID: live-service
      KAFKA_BROKERS: kafka:29092
      LIVE_EVENTS_TOPIC: live.events
