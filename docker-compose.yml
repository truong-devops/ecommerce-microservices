      context: ./services/order-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/order-service/.env
        required: false
    environment:
      APP_NAME: order-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      DATABASE_URL: postgresql://eorder:eorder@postgres:5432/ecommerce_order
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      PRODUCT_SERVICE_BASE_URL: http://product-service:8080/api/v1
      DEPENDENCY_TIMEOUT_MS: 5000
      IDEMPOTENCY_RECORD_TTL_MINUTES: 60
      IDEMPOTENCY_LOCK_TTL_SECONDS: 30
      DISPATCH_INTERVAL_MS: 3000
      DISPATCH_BATCH_SIZE: 50
      DISPATCH_MAX_RETRY: 10
      CHECKOUT_SAGA_TIMEOUT_ENABLED: 'true'
      CHECKOUT_SAGA_TIMEOUT_INTERVAL_MS: 60000
      CHECKOUT_SAGA_TIMEOUT_AFTER_MS: 900000
      CHECKOUT_SAGA_TIMEOUT_BATCH_SIZE: 100
      SEND_MESSAGE_RATE_RPS: 5
      SEND_MESSAGE_RATE_BURST: 20
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:29092
      ORDER_EVENTS_TOPIC: order.events
      INVENTORY_EVENTS_TOPIC: inventory.events
      INVENTORY_EVENTS_CONSUMER_GROUP: order-service-inventory-events-group
      PAYMENT_EVENTS_TOPIC: payment.events
      PAYMENT_EVENTS_CONSUMER_GROUP: order-service-payment-events-group
      NOTIFICATION_EVENTS_TOPIC: notification.events
      ANALYTICS_EVENTS_TOPIC: analytics.events
      AUDIT_EVENTS_TOPIC: audit.events
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_order_service.sql
    ports:
      - '12016:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-service:
    <<: *service-defaults
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/payment-service/.env
        required: false
    ports:
      - '12017:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  inventory-service:
    <<: *service-defaults
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/inventory-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_NAME: inventory-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://einventory:einventory@postgres:5432/ecommerce_inventory
      DB_SSL: 'false'
      REDIS_ENABLED: 'false'
      REDIS_URL: redis://redis:6379
      RESERVATION_DEFAULT_TTL_MINUTES: 1440
      RESERVATION_EXPIRE_CHECK_INTERVAL_MS: 15000
      RESERVATION_EXPIRE_BATCH_SIZE: 200
      OUTBOX_DISPATCH_INTERVAL_MS: 3000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_RETRY: 10
      KAFKA_ENABLED: 'true'
      KAFKA_CLIENT_ID: inventory-service
      KAFKA_CONSUMER_GROUP_ID: inventory-service-group
      KAFKA_BROKERS: kafka:29092
      ORDER_EVENTS_TOPIC: order.events
      ORDER_EVENTS_CONSUMER_GROUP: inventory-service-order-events-group
      PRODUCT_EVENTS_TOPIC: product.events
      PRODUCT_EVENTS_CONSUMER_GROUP: inventory-service-product-events-group
      INVENTORY_EVENTS_TOPIC: inventory.events
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_inventory_service.sql
    ports:
      - '12013:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  shipping-service:
    <<: *service-defaults
    build:
      context: ./services/shipping-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/shipping-service/.env
        required: false
    environment:
      APP_NAME: shipping-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}
      ORDER_SERVICE_BASE_URL: http://order-service:8080/api/v1
      DEPENDENCY_TIMEOUT_MS: 5000
      SHIPPING_WEBHOOK_SIGNING_SECRET: dev-shipping-webhook-signing-secret
      NEXUS_ENABLED: 'false'
      NEXUS_WEBHOOK_ENABLED: 'false'
      NEXUS_BASE_URL: https://ops.nexus-ex.site
      NEXUS_AUTO_CREATE_PICKUP: 'false'
      NEXUS_DEFAULT_SERVICE_TYPE: STANDARD
      NEXUS_DEFAULT_PICKUP_TYPE: PICKUP
      NEXUS_DEFAULT_PAYER: RECEIVER
      NEXUS_DEFAULT_WEIGHT_GRAM: 500
      NEXUS_DEFAULT_LENGTH_CM: 20
      NEXUS_DEFAULT_WIDTH_CM: 15
      NEXUS_DEFAULT_HEIGHT_CM: 10
      NEXUS_REQUEST_TIMEOUT_MS: 10000
      DATABASE_URL: postgresql://eshipping:eshipping@postgres:5432/ecommerce_shipping
      DB_SSL: 'false'
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      OUTBOX_DISPATCH_INTERVAL_MS: 3000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_RETRY: 10
      WEBHOOK_IDEMPOTENCY_TTL_MINUTES: 1440
      KAFKA_ENABLED: 'true'
      KAFKA_CLIENT_ID: shipping-service
      KAFKA_BROKERS: kafka:29092
      ORDER_EVENTS_TOPIC: order.events
      ORDER_EVENTS_CONSUMER_GROUP: shipping-service-order-events-group
      SHIPPING_EVENTS_TOPIC: shipping.events
      NOTIFICATION_EVENTS_TOPIC: notification.events
      ANALYTICS_EVENTS_TOPIC: analytics.events
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: /migrations/0001_init_shipping_service.sql
    ports:
      - '12018:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  review-service:
