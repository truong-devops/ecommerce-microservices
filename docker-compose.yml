x-service-defaults: &service-defaults
  restart: unless-stopped
  extra_hosts:
    - 'host.docker.internal:host-gateway'

x-shared-jwt-access-secret: &shared-jwt-access-secret
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}

x-shared-jwt-gateway-secret: &shared-jwt-gateway-secret
  JWT_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ['CMD', 'bash', '-lc', 'echo srvr | nc -w 2 localhost 2181 | grep Mode']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-localhost}:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - '9092:9092'
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'bash', '-lc', 'kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1']
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:7
    command: ['--bind_ip_all']
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - '12030:9000'
      - '12031:9001'

  auth-service:
    <<: *service-defaults
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/auth-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      PORT: 8080
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      JWT_ACCESS_EXPIRES_IN: 8h
      JWT_REFRESH_SECRET: dev-shared-jwt-refresh-secret-min-32-chars
      JWT_REFRESH_EXPIRES_IN: 45d
      JWT_MFA_SECRET: dev-shared-jwt-mfa-secret-min-32-chars
      REFRESH_TOKEN_PEPPER: dev-refresh-token-pepper-16chars
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/auth_db
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    ports:
      - '12010:8080'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:8080/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-service:
    <<: *service-defaults
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/user-service/.env
        required: false
    environment:
      NODE_ENV: development
      SERVICE_NAME: user-service
      PORT: 8080
      API_PREFIX: api/v1
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecommerce_user
      DB_SSL: 'false'
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_user_service_go.sql
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: ${USER_SERVICE_KAFKA_ENABLED:-false}
      KAFKA_CLIENT_ID: ${USER_SERVICE_KAFKA_CLIENT_ID:-user-service}
      KAFKA_BROKERS: ${USER_SERVICE_KAFKA_BROKERS:-kafka:29092}
      KAFKA_USER_TOPIC: ${USER_SERVICE_KAFKA_USER_TOPIC:-user.registered}
    ports:
      - '12011:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  product-service:
    <<: *service-defaults
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/product-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      PORT: 8080
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      DATABASE_URL: mongodb://mongo:27017/ecommerce_product
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_ENABLED: 'false'
    ports:
      - '12012:8080'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:8080/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  media-service:
    <<: *service-defaults
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/media-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_NAME: media-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ecommerce-media
      MINIO_USE_SSL: 'false'
      OBJECT_KEY_PREFIX: products
      MEDIA_UPLOAD_DEFAULT_EXPIRY_SECONDS: 900
      MEDIA_DOWNLOAD_DEFAULT_EXPIRY_SECONDS: 900
      MEDIA_MAX_EXPIRY_SECONDS: 3600
    ports:
      - '12022:8080'
    depends_on:
      minio:
        condition: service_started

  cart-service:
    <<: *service-defaults
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/cart-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_NAME: cart-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      DB_SSL: 'false'
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      CART_TTL_SECONDS: 259200
      CART_MAX_QTY_PER_ITEM: 99
      CART_DEFAULT_CURRENCY: USD
      CART_PERSISTENCE_ENABLED: 'false'
      KAFKA_ENABLED: 'false'
      KAFKA_CLIENT_ID: cart-service
      KAFKA_BROKERS: kafka:29092
      CART_EVENTS_TOPIC: cart.events
      CART_VALIDATE_EXTERNAL: 'false'
      PRODUCT_SERVICE_BASE_URL: http://product-service:8080/api/v1
      INVENTORY_SERVICE_BASE_URL: http://inventory-service:8080/api/v1
      DEPENDENCY_TIMEOUT_MS: 5000
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_cart_service.sql
    ports:
      - '12015:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  order-service:
    <<: *service-defaults
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/order-service/.env
        required: false
    environment:
      APP_NAME: order-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      IDEMPOTENCY_RECORD_TTL_MINUTES: 60
      IDEMPOTENCY_LOCK_TTL_SECONDS: 30
      DISPATCH_INTERVAL_MS: 3000
      DISPATCH_BATCH_SIZE: 50
      DISPATCH_MAX_RETRY: 10
      SEND_MESSAGE_RATE_RPS: 5
      SEND_MESSAGE_RATE_BURST: 20
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:29092
      ORDER_EVENTS_TOPIC: order.events
      INVENTORY_EVENTS_TOPIC: inventory.events
      PAYMENT_EVENTS_TOPIC: payment.events
      NOTIFICATION_EVENTS_TOPIC: notification.events
      ANALYTICS_EVENTS_TOPIC: analytics.events
      AUDIT_EVENTS_TOPIC: audit.events
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_order_service.sql
    ports:
      - '12016:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-service:
    <<: *service-defaults
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/payment-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_NAME: payment-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      PAYMENT_GATEWAY: mock
      KAFKA_BROKERS: kafka:29092
      ORDER_EVENTS_TOPIC: order.events
      ORDER_EVENTS_CONSUMER_GROUP: payment-service-order-events-group
      PAYMENT_EVENTS_TOPIC: payment.events
      NOTIFICATION_EVENTS_TOPIC: notification.events
      ANALYTICS_EVENTS_TOPIC: analytics.events
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_payment_service.sql
    ports:
      - '12017:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  inventory-service:
    <<: *service-defaults
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/inventory-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_NAME: inventory-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      DB_SSL: 'false'
      REDIS_ENABLED: 'false'
      REDIS_URL: redis://redis:6379
      RESERVATION_DEFAULT_TTL_MINUTES: 10
      RESERVATION_EXPIRE_CHECK_INTERVAL_MS: 15000
      RESERVATION_EXPIRE_BATCH_SIZE: 200
      OUTBOX_DISPATCH_INTERVAL_MS: 3000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_RETRY: 10
      KAFKA_ENABLED: 'false'
      KAFKA_CLIENT_ID: inventory-service
      KAFKA_CONSUMER_GROUP_ID: inventory-service-group
      KAFKA_BROKERS: kafka:29092
      INVENTORY_EVENTS_TOPIC: inventory.events
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_inventory_service.sql
    ports:
      - '12013:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  shipping-service:
    <<: *service-defaults
    build:
      context: ./services/shipping-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/shipping-service/.env
        required: false
    environment:
      APP_NAME: shipping-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      DB_SSL: 'false'
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      OUTBOX_DISPATCH_INTERVAL_MS: 3000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_RETRY: 10
      WEBHOOK_IDEMPOTENCY_TTL_MINUTES: 1440
      KAFKA_ENABLED: 'true'
      KAFKA_CLIENT_ID: shipping-service
      KAFKA_BROKERS: kafka:29092
      ORDER_EVENTS_TOPIC: order.events
      ORDER_EVENTS_CONSUMER_GROUP: shipping-service-order-events-group
      SHIPPING_EVENTS_TOPIC: shipping.events
      NOTIFICATION_EVENTS_TOPIC: notification.events
      ANALYTICS_EVENTS_TOPIC: analytics.events
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: /migrations/0001_init_shipping_service.sql
    ports:
      - '12018:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  review-service:
    <<: *service-defaults
    image: ecommerce-microservices-review-service
    build:
      context: ./services/review-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/review-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      PORT: 8080
      MONGODB_URI: mongodb://mongo:27017/ecommerce_review
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
    ports:
      - '12014:8080'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  chat-service:
    <<: *service-defaults
    build:
      context: ./services/chat-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/chat-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_NAME: chat-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      MONGO_URI: mongodb://mongo:27017
      MONGO_DATABASE: ecommerce_chat
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      KAFKA_ENABLED: 'true'
      KAFKA_CLIENT_ID: chat-service
      KAFKA_BROKERS: kafka:29092
      CHAT_EVENTS_TOPIC: chat.events
      NOTIFICATION_EVENTS_TOPIC: notification.events
      ANALYTICS_EVENTS_TOPIC: analytics.events
      DISPATCH_INTERVAL_MS: 3000
      DISPATCH_BATCH_SIZE: 50
      DISPATCH_MAX_RETRY: 10
    ports:
      - '12020:8080'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    <<: *service-defaults
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/notification-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      REDIS_URL: redis://redis:6379
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: /migrations/0001_init_notification_service.sql
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:29092
    ports:
      - '12019:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  analytics-service:
    <<: *service-defaults
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/analytics-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      DB_SSL: 'false'
      DB_POOL_MAX: 10
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: 'false'
      KAFKA_BROKERS: kafka:29092
    ports:
      - '12021:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    <<: *service-defaults
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    env_file:
      - path: ./services/api-gateway/.env
        required: false
    environment:
      <<: *shared-jwt-gateway-secret
      APP_NAME: api-gateway
      APP_ENV: development
      PORT: 8080
      REQUEST_TIMEOUT: 45s
      JWT_SECRET: dev-shared-jwt-access-secret-min-32-chars
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8080
      AUTH_SERVICE_TIMEOUT: 20s
      USER_SERVICE_URL: http://user-service:8080
      PRODUCT_SERVICE_URL: http://product-service:8080
      PRODUCT_SERVICE_TIMEOUT: 20s
      MEDIA_SERVICE_URL: http://media-service:8080
      MEDIA_SERVICE_TIMEOUT: 20s
      CART_SERVICE_URL: http://cart-service:8080
      ORDER_SERVICE_URL: http://order-service:8080
      PAYMENT_SERVICE_URL: http://payment-service:8080
      INVENTORY_SERVICE_URL: http://inventory-service:8080
      SHIPPING_SERVICE_URL: http://shipping-service:8080
      REVIEW_SERVICE_URL: http://review-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
      ANALYTICS_SERVICE_URL: http://analytics-service:8080
      CHAT_SERVICE_URL: http://chat-service:8080
      CHAT_SERVICE_TIMEOUT: 24h
    ports:
      - '12000:8080'
    depends_on:
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_healthy
      media-service:
        condition: service_started
      cart-service:
        condition: service_started
      order-service:
        condition: service_started
      payment-service:
        condition: service_started
      inventory-service:
        condition: service_started
      shipping-service:
        condition: service_started
      review-service:
        condition: service_started
      chat-service:
        condition: service_started
      notification-service:
        condition: service_started
      analytics-service:
        condition: service_started

volumes:
  postgres_data:
  mongo_data:
  minio_data:
