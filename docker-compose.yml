      MIGRATION_FILE: /migrations/0001_init_notification_service.sql
      KAFKA_ENABLED: 'true'
      KAFKA_BROKERS: kafka:29092
    ports:
      - '12019:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  analytics-service:
    <<: *service-defaults
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/analytics-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://eanalytics:eanalytics@postgres:5432/ecommerce_analytics
      DB_SSL: 'false'
      DB_POOL_MAX: 10
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: 'false'
      KAFKA_BROKERS: kafka:29092
    ports:
      - '12021:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    <<: *service-defaults
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    env_file:
      - path: ./services/api-gateway/.env
        required: false
    environment:
      <<: *shared-jwt-gateway-secret
      APP_NAME: api-gateway
      APP_ENV: development
      PORT: 8080
      REQUEST_TIMEOUT: 45s
      JWT_SECRET: dev-shared-jwt-access-secret-min-32-chars
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:8080
      AUTH_SERVICE_TIMEOUT: 20s
      USER_SERVICE_URL: http://user-service:8080
      PRODUCT_SERVICE_URL: http://product-service:8080
      PRODUCT_SERVICE_TIMEOUT: 20s
