      CART_TTL_SECONDS: 259200
      CART_MAX_QTY_PER_ITEM: 99
      CART_DEFAULT_CURRENCY: USD
      CART_PERSISTENCE_ENABLED: 'false'
      KAFKA_ENABLED: 'false'
      KAFKA_CLIENT_ID: cart-service
      KAFKA_BROKERS: kafka:29092
      CART_EVENTS_TOPIC: cart.events
      CART_VALIDATE_EXTERNAL: 'true'
      PRODUCT_SERVICE_BASE_URL: http://product-service:8080/api/v1
      INVENTORY_SERVICE_BASE_URL: http://inventory-service:8080/api/v1
      DEPENDENCY_TIMEOUT_MS: 5000
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_cart_service.sql
    ports:
      - '12015:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  order-service:
    <<: *service-defaults
