x-service-defaults: &service-defaults
  restart: unless-stopped
  extra_hosts:
    - 'host.docker.internal:host-gateway'

x-shared-jwt-access-secret: &shared-jwt-access-secret
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}

x-shared-jwt-gateway-secret: &shared-jwt-gateway-secret
  JWT_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://0.0.0.0:29093,PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-localhost}:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
    ports:
      - '9092:9092'
    healthcheck:
      test: ['CMD', 'bash', '-lc', 'kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1']
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init-multiple-dbs.sql:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d postgres']
      interval: 5s
      timeout: 3s
      retries: 20

  mongo:
    image: mongo:7
    command: ['--bind_ip_all']
    volumes:
      - mongo_data:/data/db
    ports:
    - '37017:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - '12030:9000'
      - '12031:9001'

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    environment:
      MTX_HLSVARIANT: lowLatency
      MTX_WEBRTCIPSFROMINTERFACES: 'no'
      MTX_WEBRTCADDITIONALHOSTS: 127.0.0.1
    ports:
      - '1935:1935'
      - '8554:8554'
      - '12088:8888'
      - '12089:8889'
      - '8189:8189/udp'

  auth-service:
    <<: *service-defaults
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/auth-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      PORT: 8080
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      JWT_ACCESS_EXPIRES_IN: 8h
      JWT_REFRESH_SECRET: dev-shared-jwt-refresh-secret-min-32-chars
      JWT_REFRESH_EXPIRES_IN: 45d
      JWT_MFA_SECRET: dev-shared-jwt-mfa-secret-min-32-chars
      REFRESH_TOKEN_PEPPER: dev-refresh-token-pepper-16chars
      DATABASE_URL: postgresql://eauth:eauth@postgres:5432/ecommerce_auth
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-dev-google-client-id.apps.googleusercontent.com}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-dev-google-client-secret}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:12010/api/v1/auth/oauth/google/callback}
      GOOGLE_OAUTH_SCOPES: ${GOOGLE_OAUTH_SCOPES:-openid email profile}
      BUYER_WEB_BASE_URL: ${BUYER_WEB_BASE_URL:-http://localhost:8888}
      BUYER_MOBILE_OAUTH_CALLBACK_URL: ${BUYER_MOBILE_OAUTH_CALLBACK_URL:-dtcommercebuyer://auth/google/callback}
      SELLER_WEB_BASE_URL: ${SELLER_WEB_BASE_URL:-http://localhost:6789}
      MODERATOR_WEB_BASE_URL: ${MODERATOR_WEB_BASE_URL:-http://localhost:1111}
    ports:
      - '12010:8080'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:8080/api/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-service:
    <<: *service-defaults
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/user-service/.env
        required: false
    environment:
      NODE_ENV: development
      SERVICE_NAME: user-service
      PORT: 8080
      API_PREFIX: api/v1
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: euser
      DB_PASSWORD: euser
      DB_NAME: ecommerce_user
      DB_SSL: 'false'
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_user_service_go.sql
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: ${USER_SERVICE_KAFKA_ENABLED:-false}
      KAFKA_CLIENT_ID: ${USER_SERVICE_KAFKA_CLIENT_ID:-user-service}
      KAFKA_BROKERS: ${USER_SERVICE_KAFKA_BROKERS:-kafka:29092}
      KAFKA_USER_TOPIC: ${USER_SERVICE_KAFKA_USER_TOPIC:-user.registered}
    ports:
      - '12011:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  product-service:
    <<: *service-defaults
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/product-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      DATABASE_URL: mongodb://mongo:27017/ecommerce_product
      DATABASE_NAME: ecommerce_product
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_ENABLED: 'true'
      SEARCH_ENABLED: 'false'
      MEDIA_PUBLIC_BASE_URL: ${MEDIA_PUBLIC_BASE_URL:-http://localhost:12030/ecommerce-media}
      VIDEO_REVIEW_REQUIRED: ${VIDEO_REVIEW_REQUIRED:-true}
    ports:
      - '12012:8080'
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  media-service:
    <<: *service-defaults
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/media-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_NAME: media-service
      APP_ENV: development
      PORT: 8080
      API_PREFIX: api/v1
      JWT_ACCESS_SECRET: dev-shared-jwt-access-secret-min-32-chars
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-127.0.0.1:12030}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ecommerce-media
      MINIO_REGION: us-east-1
      MINIO_USE_SSL: 'false'
      MINIO_PUBLIC_USE_SSL: 'false'
      MINIO_PUBLIC_READ: 'true'
      OBJECT_KEY_PREFIX: products
      MEDIA_UPLOAD_DEFAULT_EXPIRY_SECONDS: 900
      MEDIA_DOWNLOAD_DEFAULT_EXPIRY_SECONDS: 900
      MEDIA_MAX_EXPIRY_SECONDS: 3600
    ports:
      - '12022:8080'
    depends_on:
      minio:
        condition: service_started

  cart-service:
    <<: *service-defaults
    build:
      context: ./services/cart-service
      dockerfile: Dockerfile
    env_file:
      - path: ./services/cart-service/.env
        required: false
    environment:
      <<: *shared-jwt-access-secret
      APP_NAME: cart-service
