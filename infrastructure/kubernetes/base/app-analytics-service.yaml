apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: analytics-service
          image: analytics-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ecommerce-common-config
            - secretRef:
                name: ecommerce-secrets
          env:
            - name: APP_NAME
              value: analytics-service
            - name: DATABASE_URL
              value: postgresql://eanalytics:eanalytics@postgres:5432/ecommerce_analytics?sslmode=disable
            - name: KAFKA_ENABLED
              value: "false"
            - name: REDIS_ENABLED
              value: "true"
            - name: RECOMMENDATION_ENABLED
              value: "false"
            - name: ORDER_SERVICE_BASE_URL
              value: http://order-service:8080/api/v1
            - name: ORDER_SERVICE_INTERNAL_TOKEN
              value: dev-internal-service-token
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  labels:
    app: analytics-service
spec:
  type: ClusterIP
  selector:
    app: analytics-service
  ports:
    - name: http
      port: 8080
      targetPort: http
