apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  labels:
    app: chat-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: chat-service
          image: chat-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ecommerce-common-config
            - secretRef:
                name: ecommerce-secrets
          env:
            - name: APP_NAME
              value: chat-service
            - name: MONGO_URI
              value: mongodb://mongo:27017
            - name: MONGO_DATABASE
              value: ecommerce_chat
            - name: KAFKA_ENABLED
              value: "false"
            - name: REDIS_ENABLED
              value: "true"
            - name: WS_ALLOWED_ORIGINS
              value: https://seller.dt-commerce.site,https://buyer.dt-commerce.site,https://moderator.dt-commerce.site,http://localhost,http://127.0.0.1,http://localhost:8081,http://127.0.0.1:8081,http://localhost:19006,http://127.0.0.1:19006
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  labels:
    app: chat-service
spec:
  type: ClusterIP
  selector:
    app: chat-service
  ports:
    - name: http
      port: 8080
      targetPort: http
