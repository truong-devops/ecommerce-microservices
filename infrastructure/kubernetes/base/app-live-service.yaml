apiVersion: apps/v1
kind: Deployment
metadata:
  name: live-service
  labels:
    app: live-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: live-service
  template:
    metadata:
      labels:
        app: live-service
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: live-service
          image: live-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ecommerce-common-config
            - secretRef:
                name: ecommerce-secrets
          env:
            - name: APP_NAME
              value: live-service
            - name: MONGO_URI
              value: mongodb://mongo:27017
            - name: MONGO_DATABASE
              value: ecommerce_live
            - name: KAFKA_ENABLED
              value: "false"
            - name: REDIS_ENABLED
              value: "true"
            - name: PRODUCT_SERVICE_BASE_URL
              value: http://product-service:8080/api/v1
            - name: LIVE_MEDIA_MODE
              value: p2p_legacy
            - name: WS_ALLOWED_ORIGINS
              value: "*"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: live-service
  labels:
    app: live-service
spec:
  type: ClusterIP
  selector:
    app: live-service
  ports:
    - name: http
      port: 8080
      targetPort: http
