apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  labels:
    app: media-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: media-service
          image: media-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ecommerce-common-config
            - secretRef:
                name: ecommerce-secrets
          env:
            - name: APP_NAME
              value: media-service
            - name: MINIO_ENDPOINT
              value: minio:9000
            - name: MINIO_PUBLIC_ENDPOINT
              value: api.dt-commerce.site
            - name: MINIO_ACCESS_KEY
              value: minioadmin
            - name: MINIO_SECRET_KEY
              value: minioadmin
            - name: MINIO_BUCKET
              value: ecommerce-media
            - name: MINIO_REGION
              value: us-east-1
            - name: MINIO_USE_SSL
              value: "false"
            - name: MINIO_PUBLIC_USE_SSL
              value: "true"
            - name: MINIO_PUBLIC_READ
              value: "true"
            - name: OBJECT_KEY_PREFIX
              value: products
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
  labels:
    app: media-service
spec:
  type: ClusterIP
  selector:
    app: media-service
  ports:
    - name: http
      port: 8080
      targetPort: http
