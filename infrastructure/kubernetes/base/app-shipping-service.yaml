apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-service
  labels:
    app: shipping-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping-service
  template:
    metadata:
      labels:
        app: shipping-service
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: shipping-service
          image: shipping-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ecommerce-common-config
            - secretRef:
                name: ecommerce-secrets
          env:
            - name: APP_NAME
              value: shipping-service
            - name: DATABASE_URL
              value: postgresql://eshipping:eshipping@postgres:5432/ecommerce_shipping?sslmode=disable
            - name: DB_MIGRATIONS_RUN
              value: "true"
            - name: MIGRATION_FILE
              value: /migrations/0001_init_shipping_service.sql
            - name: KAFKA_ENABLED
              value: "false"
            - name: REDIS_ENABLED
              value: "true"
            - name: ORDER_SERVICE_BASE_URL
              value: http://order-service:8080/api/v1
            - name: SHIPPING_WEBHOOK_SIGNING_SECRET
              value: dev-shipping-webhook-signing-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: shipping-service
  labels:
    app: shipping-service
spec:
  type: ClusterIP
  selector:
    app: shipping-service
  ports:
    - name: http
      port: 8080
      targetPort: http
