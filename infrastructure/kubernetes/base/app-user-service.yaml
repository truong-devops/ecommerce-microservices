apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      nodeSelector:
        workload: app
      containers:
        - name: user-service
          image: user-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ecommerce-common-config
            - secretRef:
                name: ecommerce-secrets
          env:
            - name: SERVICE_NAME
              value: user-service
            - name: DATABASE_URL
              value: postgresql://euser:euser@postgres:5432/ecommerce_user?sslmode=disable
            - name: DB_MIGRATIONS_RUN
              value: "true"
            - name: MIGRATION_FILE
              value: /migrations/0001_init_user_service_go.sql
            - name: KAFKA_CLIENT_ID
              value: user-service
            - name: KAFKA_USER_TOPIC
              value: user.registered
            - name: INTERNAL_SERVICE_TOKEN
              value: dev-internal-service-token
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 8080
      targetPort: http
