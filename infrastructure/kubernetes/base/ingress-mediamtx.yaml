apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediamtx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-http01
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - live-ingest.dt-commerce.site
        - live-playback.dt-commerce.site
      secretName: live-media-dt-commerce-site-tls
  rules:
    - host: live-ingest.dt-commerce.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mediamtx
                port:
                  name: webrtc-http
    - host: live-playback.dt-commerce.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mediamtx
                port:
                  name: hls
