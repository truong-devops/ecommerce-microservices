apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-http01
    nginx.ingress.kubernetes.io/proxy-body-size: 20m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.dt-commerce.site
      secretName: api-dt-commerce-site-tls
  rules:
    - host: api.dt-commerce.site
      http:
        paths:
          - path: /ecommerce-media
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  name: api
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  name: http
