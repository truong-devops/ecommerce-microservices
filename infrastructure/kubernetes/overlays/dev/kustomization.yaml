apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ecommerce-dev

resources:
  - ../../base

images:
  - name: api-gateway
    newName: docker.io/vantruong179/ecommerce-microservices-api-gateway
    newTag: dev
  - name: auth-service
    newName: docker.io/vantruong179/ecommerce-microservices-auth-service
    newTag: dev
  - name: user-service
    newName: docker.io/vantruong179/ecommerce-microservices-user-service
    newTag: dev
  - name: product-service
    newName: docker.io/vantruong179/ecommerce-microservices-product-service
    newTag: dev
  - name: cart-service
    newName: docker.io/vantruong179/ecommerce-microservices-cart-service
    newTag: dev
