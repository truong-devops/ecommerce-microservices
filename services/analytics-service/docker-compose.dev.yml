services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eanalytics
      POSTGRES_PASSWORD: eanalytics
      POSTGRES_DB: ecommerce_analytics
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eanalytics -d ecommerce_analytics']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env.example
    environment:
      APP_NAME: analytics-service
      APP_ENV: development
      PORT: 3010
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://eanalytics:eanalytics@postgres:5432/ecommerce_analytics
      DB_SSL: 'false'
      DB_POOL_MAX: 10
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: 'true'
      KAFKA_CLIENT_ID: analytics-service
      KAFKA_BROKERS: host.docker.internal:9092
      ANALYTICS_EVENTS_TOPIC: analytics.events
      ANALYTICS_CONSUMER_GROUP: analytics-service-group
      INGEST_DEDUPE_TTL_SECONDS: 172800
    ports:
      - '3010:3010'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
