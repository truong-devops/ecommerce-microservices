services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - media_service_minio_data:/data

  media-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env.example
    environment:
      PORT: 8080
    ports:
      - '12022:8080'
    depends_on:
      - minio
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  media_service_minio_data:
