services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: enotification
      POSTGRES_PASSWORD: enotification
      POSTGRES_DB: ecommerce_notification
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U enotification -d ecommerce_notification']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env.example
    environment:
      APP_NAME: notification-service
      APP_ENV: development
      PORT: 3011
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://enotification:enotification@postgres:5432/ecommerce_notification
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      KAFKA_ENABLED: 'false'
      KAFKA_BROKERS: host.docker.internal:9092
    ports:
      - '3011:3011'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
