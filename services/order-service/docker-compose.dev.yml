services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
      POSTGRES_DB: ecommerce
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecommerce -d ecommerce']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env.example
    environment:
      APP_NAME: order-service
      APP_ENV: development
      PORT: 3011
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://ecommerce:ecommerce@postgres:5432/ecommerce
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      IDEMPOTENCY_RECORD_TTL_MINUTES: 60
      IDEMPOTENCY_LOCK_TTL_SECONDS: 30
      DISPATCH_INTERVAL_MS: 3000
      DISPATCH_BATCH_SIZE: 50
      DISPATCH_MAX_RETRY: 10
      KAFKA_ENABLED: 'false'
      KAFKA_BROKERS: host.docker.internal:9092
      ORDER_EVENTS_TOPIC: order.events
      INVENTORY_EVENTS_TOPIC: inventory.events
      PAYMENT_EVENTS_TOPIC: payment.events
      NOTIFICATION_EVENTS_TOPIC: notification.events
      ANALYTICS_EVENTS_TOPIC: analytics.events
      AUDIT_EVENTS_TOPIC: audit.events
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_order_service.sql
    ports:
      - '3011:3011'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
