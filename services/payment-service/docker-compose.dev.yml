services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: epayment
      POSTGRES_PASSWORD: epayment
      POSTGRES_DB: ecommerce_payment
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U epayment -d ecommerce_payment']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env.example
    environment:
      APP_NAME: payment-service
      APP_ENV: development
      PORT: 3006
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://epayment:epayment@postgres:5432/ecommerce_payment
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}
      REDIS_ENABLED: 'true'
      REDIS_URL: redis://redis:6379
      IDEMPOTENCY_RECORD_TTL_MINUTES: 60
      IDEMPOTENCY_LOCK_TTL_SECONDS: 30
      WEBHOOK_IDEMPOTENCY_TTL_MINUTES: 1440
      OUTBOX_DISPATCH_INTERVAL_MS: 3000
      OUTBOX_BATCH_SIZE: 50
      OUTBOX_MAX_RETRY: 10
      PAYMENT_GATEWAY: mock
      KAFKA_ENABLED: 'false'
      KAFKA_BROKERS: host.docker.internal:9092
      ORDER_EVENTS_TOPIC: order.events
      ORDER_EVENTS_CONSUMER_GROUP: payment-service-order-events-group
      PAYMENT_EVENTS_TOPIC: payment.events
      NOTIFICATION_EVENTS_TOPIC: notification.events
      ANALYTICS_EVENTS_TOPIC: analytics.events
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_payment_service.sql
    ports:
      - '3006:3006'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
