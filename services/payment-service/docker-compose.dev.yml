services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: epayment
      POSTGRES_PASSWORD: epayment
      POSTGRES_DB: ecommerce_payment
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U epayment -d ecommerce_payment']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: ./.env
        required: false
    ports:
      - '3006:8080'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
