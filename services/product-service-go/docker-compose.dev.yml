services:
  product-service-go:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ../product-service/.env.dev
    environment:
      PORT: 3013
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-shared-jwt-access-secret-min-32-chars}
    ports:
      - '3013:3013'
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
