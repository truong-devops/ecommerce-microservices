services:
  user-service-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_user
    restart: unless-stopped
    ports:
      - '5435:5432'
    volumes:
      - user_service_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ecommerce_user']
      interval: 5s
      timeout: 3s
      retries: 20

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      SERVICE_NAME: user-service
      PORT: 3013
      API_PREFIX: api/v1
      DB_HOST: user-service-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: ecommerce_user
      DB_SSL: 'false'
      DB_MIGRATIONS_RUN: 'true'
      MIGRATION_FILE: migrations/0001_init_user_service_go.sql
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-user-service}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-host.docker.internal:9092}
      KAFKA_USER_TOPIC: ${KAFKA_USER_TOPIC:-user.registered}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      user-service-db:
        condition: service_healthy
    ports:
      - '3110:3013'
    restart: unless-stopped

volumes:
  user_service_pg_data:
